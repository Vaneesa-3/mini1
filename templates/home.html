<!DOCTYPE html>
<html>
<head>
<title>Exam Automation System</title>

<style>
        /* ---------- Global Styles ---------- */
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
    margin: 0;
    background: #f4f6f9;
    color: #333;
}

        /* ---------- Header ---------- */
        .header {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    padding: 25px;
    text-align: center;
}

.header h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 600;
}

.header p {
    margin-top: 6px;
    font-size: 14px;
    opacity: 0.9;
}


        /* ---------- Select Dropdown ---------- */
        select {
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            cursor: pointer;
            transition: 0.2s;
        }

        select:hover {
            border-color: #2a5298;
        }

        /* ---------- Container / Card ---------- */
        .container {
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .card h2 {
            margin-bottom: 15px;
            font-size: 20px;
            color: #2a5298;
            border-left: 4px solid #2a5298;
            padding-left: 10px;
            text-align: center;
        }

        /* ---------- Button ---------- */
        .submit-btn,
        button {
            background: #2a5298;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover,
        button:hover {
            background: #1e3c72;
        }

        /* ---------- Responsive ---------- */
        @media(max-width:600px){
            .container {
                padding: 15px;
            }
        }
    </style>

</head>

<body>
<div class="header">
<h1>Government Engineering College,Thrissur</h1>
<h3>Department of Computer Science & Engineering</h3>
<p>Internal Examination Management System</p>
</div>

<div class="container">
<h3>Select Module</h3>

<select onchange="navigate(this.value)">



<option value="/timetable">Timetable Generation</option>

<option value="/seating">Seating Arrangement</option>

<option value="/faculty">Faculty Mapping</option>

<option value="/signpage">Sign Page Download</option>

</select>

<script>

function navigate(page){

if(page!=""){
window.location.href=page
}

}

</script>
</div>
</body>
</html>
